version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - copyloopvar
    - misspell
    - bodyclose
    - noctx
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (io.Closer).Close
        - (*net.Conn).Close
        - os.Remove
        # Diagnostic writes to an io.Writer param (CLI stdout/stderr): errcheck
        # already ignores fmt.Fprint* to os.Stdout/os.Stderr literals, but the
        # CLI commands take writers for testability, so exclude them explicitly.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    govet:
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    rules:
      # Eclipse Mosquitto is the correct product spelling (not "Mosquito").
      - linters: [misspell]
        text: "Mosquitto"
