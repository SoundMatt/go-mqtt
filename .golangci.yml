version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - copyloopvar
    - misspell
    - bodyclose
    - noctx
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (io.Closer).Close
        - (*net.Conn).Close
        - os.Remove
    govet:
      enable-all: true
      disable:
        - fieldalignment
