name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Unit tests (all packages, cross-platform) ─────────────────────────────
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25", "1.26"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: go test (unit, -race)
        shell: bash
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  # ── Benchmark smoke ────────────────────────────────────────────────────────
  # Run each benchmark once to catch panics and allocation regressions.
  # Skips gracefully when mock/ is not yet present (bootstrap phase).
  benchmark-smoke:
    name: Benchmark smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: go test -bench (mock)
        run: |
          if [ -d mock ]; then
            go test -bench=. -benchtime=1x -benchmem -run=^$ ./mock/...
          else
            echo "::notice::mock/ not yet in repo — skipping benchmark smoke"
          fi

  # ── Short fuzz run ────────────────────────────────────────────────────────
  # Skips targets that do not yet exist in the repo (bootstrap phase).
  fuzz-short:
    name: Fuzz (short, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Clear fuzz corpus cache
        run: go clean -fuzzcache

      - name: FuzzMatchTopic
        run: |
          if [ -f mqtt_fuzz_test.go ]; then
            go test -fuzz=^FuzzMatchTopic$ -fuzztime=500000x .
          else
            echo "::notice::FuzzMatchTopic not yet in repo — skipping"
          fi

      - name: FuzzPublish (mock)
        run: |
          if [ -d mock ] && grep -qr FuzzPublish mock/ 2>/dev/null; then
            go test -fuzz=^FuzzPublish$ -fuzztime=500000x ./mock/...
          else
            echo "::notice::FuzzPublish not yet in repo — skipping"
          fi

      - name: FuzzReadPropSet (v5)
        run: |
          if [ -d v5 ] && grep -qr FuzzReadPropSet v5/ 2>/dev/null; then
            go test -fuzz=^FuzzReadPropSet$ -fuzztime=500000x ./v5/...
          else
            echo "::notice::FuzzReadPropSet not yet in repo — skipping"
          fi

      - name: FuzzBuildPublish (v5)
        run: |
          if [ -d v5 ] && grep -qr FuzzBuildPublish v5/ 2>/dev/null; then
            go test -fuzz=^FuzzBuildPublish$ -fuzztime=500000x ./v5/...
          else
            echo "::notice::FuzzBuildPublish not yet in repo — skipping"
          fi

  # ── Integration test against Mosquitto (optional, Docker-gated) ───────────
  test-mosquitto:
    name: Integration (Mosquitto, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Check prerequisites
        id: prereqs
        run: |
          if [ ! -f docker/mosquitto.conf ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::docker/mosquitto.conf not yet in repo — skipping integration tests"
          elif docker pull eclipse-mosquitto:2 2>/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Mosquitto Docker image not available — skipping integration tests"
          fi

      - name: Start Mosquitto broker
        if: steps.prereqs.outputs.available == 'true'
        run: |
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -p 9001:9001 \
            -v "$PWD/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2
          sleep 2

      - name: go test v3 (integration)
        if: steps.prereqs.outputs.available == 'true' && hashFiles('v3/*.go') != ''
        run: go test -tags integration -v -timeout 30s ./v3/...
        env:
          MQTT_BROKER: localhost:1883
          MQTT_WS_BROKER: ws://localhost:9001/

      - name: go test v5 (integration)
        if: steps.prereqs.outputs.available == 'true' && hashFiles('v5/*.go') != ''
        run: go test -tags integration -v -timeout 30s ./v5/...
        env:
          MQTT_BROKER: localhost:1883

      - name: Stop Mosquitto
        if: steps.prereqs.outputs.available == 'true'
        run: docker stop mosquitto && docker rm mosquitto

  # ── go generate check ─────────────────────────────────────────────────────
  generate:
    name: go generate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: go generate
        run: go generate ./...
      - name: Diff check (generated files must be committed)
        run: git diff --exit-code

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  # ── RELAY conformance gate (spec §20.1.1) ─────────────────────────────────
  # Builds the CLI and runs `relay conform --strict`; fails on any FAIL or WARN.
  relay-conform:
    name: RELAY conform --strict (v1.10.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build go-mqtt CLI
        run: go build -o go-mqtt ./cmd/go-mqtt
      - name: relay conform --strict
        run: go run github.com/SoundMatt/RELAY/cmd/relay@v1.10.0 conform --strict ./go-mqtt

  # ── go-FuSa full lifecycle (spec §20.1.2) ─────────────────────────────────
  # Pinned to v0.30.0. The gating steps (check/trace/cyber/vuln/qualify) fail the
  # job on any ERROR finding, untraced requirement, or failed qualification case.
  # The remaining steps regenerate the §20.4/§20.5 evidence bundle.
  gofusa:
    name: go-FuSa full lifecycle (v0.30.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install go-FuSa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@v0.30.0
      # ── Gating: ERROR findings, traceability, security, vulns, qualification ──
      - name: gofusa check (gate on ERROR findings)
        run: gofusa check ./...
      - name: gofusa trace (gate on 100% requirement traceability)
        run: gofusa trace -req-coverage 100
      - name: gofusa cyber (cybersecurity analysis)
        run: gofusa cyber
      - name: gofusa vuln (dependency vulnerability scan)
        run: gofusa vuln
      - name: gofusa qualify (tool qualification suite)
        run: gofusa qualify
      # ── Evidence (§20.4 / §20.5): non-gating, regenerated on every run ──────
      - name: gofusa verify (test evidence bundle)
        run: gofusa verify || true
      - name: gofusa hara (validate hazard analysis loads)
        run: gofusa hara show >/dev/null
      - name: gofusa tara (ISO 21434 threat analysis)
        run: gofusa tara || true
      - name: gofusa fmea (dFMEA)
        run: gofusa fmea -cyber || true
      - name: gofusa boundary (architecture diagram)
        run: gofusa boundary || true
      - name: gofusa coupling (data/control coupling)
        run: gofusa coupling || true
      - name: gofusa release (SBOM + build provenance, SLSA)
        run: gofusa release || true
      - name: gofusa audit-pack (bundle all evidence)
        run: gofusa audit-pack --output gofusa-audit-pack.zip || true
      - name: Upload evidence bundle
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gofusa-audit-pack
          path: gofusa-audit-pack.zip
          if-no-files-found: ignore
