name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Unit tests (all packages, cross-platform) ─────────────────────────────
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25", "1.26"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: go test (unit, -race)
        shell: bash
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  # ── Benchmark smoke ────────────────────────────────────────────────────────
  # Run each benchmark once to catch panics and allocation regressions.
  benchmark-smoke:
    name: Benchmark smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: go test -bench (mock)
        run: >
          go test
          -bench=.
          -benchtime=1x
          -benchmem
          -run=^$
          ./mock/...

  # ── Short fuzz run ────────────────────────────────────────────────────────
  fuzz-short:
    name: Fuzz (short, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Clear fuzz corpus cache
        run: go clean -fuzzcache

      - name: FuzzMatchTopic
        run: go test -fuzz=^FuzzMatchTopic$ -fuzztime=10s .

      - name: FuzzPublish
        run: go test -fuzz=^FuzzPublish$ -fuzztime=10s ./mock/...

  # ── Integration test against Mosquitto (optional, Docker-gated) ───────────
  test-mosquitto:
    name: Integration (Mosquitto, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Probe Mosquitto image
        id: probe
        run: |
          if docker pull eclipse-mosquitto:2 2>/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Mosquitto Docker image not available — skipping integration tests"
          fi

      - name: Start Mosquitto broker
        if: steps.probe.outputs.available == 'true'
        run: |
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -v "$PWD/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2
          sleep 2

      - name: go test (integration)
        if: steps.probe.outputs.available == 'true'
        run: go test -tags integration -v -timeout 30s ./v3/...
        env:
          MQTT_BROKER: localhost:1883

      - name: Stop Mosquitto
        if: steps.probe.outputs.available == 'true'
        run: docker stop mosquitto && docker rm mosquitto

  # ── go generate check ─────────────────────────────────────────────────────
  generate:
    name: go generate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: go generate
        run: go generate ./...
      - name: Diff check (generated files must be committed)
        run: git diff --exit-code

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  # ── go-FuSa safety gate ────────────────────────────────────────────────────
  # Pinned to v0.30.0; exits 1 on any ERROR-level finding.
  gofusa:
    name: go-FuSa safety check (v0.30.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install go-FuSa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@v0.30.0
      - name: gofusa check
        run: gofusa check ./...
